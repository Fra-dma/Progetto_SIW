<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Elenco Giocatori</title>
</head>
<body>

    <h1>Tutti i Giocatori Partecipanti</h1>

    <ul>
        <li th:each="giocatore: ${elencoGiocatori}">
            Nome: <strong th:text="${giocatore.nome}">Mario</strong> - 
            Cognome: <span th:text="${giocatore.cognome}">Rossi</span>
			<br>
			<i>Altezza: <span th:text="${giocatore.altezza}">Cm</span></i>
			<br><br>
        </li>
    </ul>

</body>
</html>
