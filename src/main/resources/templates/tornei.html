<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Elenco Tornei</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
	
    <!-- Menu in alto -->
    <div class="navbar">
        <a th:if="${isAdmin}" th:href="@{/admin/dashboard}" class="link-admin">Dashboard Admin</a>
        
        <a th:if="${!isLogged}" th:href="@{/login}">Login</a>
        
        <form th:if="${isLogged}" th:action="@{/logout}" method="post" style="margin: 0;">
            <button type="submit" class="btn btn-danger">Logout</button>
        </form>
    </div>

    <!-- Contenitore centrale per tenere tutto in ordine -->
    <div class="container">
        
        <h1>Tutti i Tornei Disponibili</h1>

        <div class="barra-azioni">
            <a th:href="@{/ricerca_squadre}" class="btn btn-primary">
               Cerca una Squadra
            </a>
        </div>

        <!-- Elenco trasformato in una griglia di schede -->
        <ul class="lista-tornei">
            <li th:each="torneo : ${elencoTornei}" class="card-torneo">
                
                <h3>
                    <a th:href="@{/torneo/{id}/classifica(id=${torneo.id})}">
                        <span th:text="${torneo.nome}">Nome Torneo</span>
                    </a>
                </h3>
                
                <p><strong>Anno:</strong> <span th:text="${torneo.anno}">2000</span></p>
                <p><i><span th:text="${torneo.descrizione}">Qui andrà la descrizione del torneo...</span></i></p>
                
                <a th:href="@{/torneo/{id}/partite(id=${torneo.id})}" class="link-partite">
                    Visualizza partite del torneo &rarr;
                </a>
                            
            </li>
        </ul>
        
    </div>

</body>
</html>
