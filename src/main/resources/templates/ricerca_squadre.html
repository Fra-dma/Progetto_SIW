<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ricerca Squadre Live (React)</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>

    <!-- Inserisco tutto nel container -->
    <div class="container" style="max-width: 600px; margin-top: 40px;">
        
        <h1 class="text-center">Ricerca Squadre</h1>
        
        <!-- Interfaccia React -->
        <div id="react-app"></div>

        <!-- Tasto per tornare indietro -->
        <div class="text-center" style="margin-top: 30px;">
            <a th:href="@{/tornei}" style="color: #555; text-decoration: none;">&larr; Torna alla Homepage</a>
        </div>
        
    </div>

    <script type="text/babel">
        /*<![CDATA[*/
        
        // Creazione del componente React
        function RicercaSquadre() {
            
            const [squadre, setSquadre] = React.useState([]);
            const [testoRicerca, setTestoRicerca] = React.useState("");

            React.useEffect(() => {
                fetch('/api/squadre')
                    .then(response => response.json()) 
                    .then(dati => setSquadre(dati));   
            }, []);

            const squadreFiltrate = squadre.filter(squadra => 
                squadra.nome.toLowerCase().includes(testoRicerca.toLowerCase())
            );

            return (
                <div>
                    {/* Barra di ricerca */}
                    <div className="form-group">
                        <input 
                            type="text" 
                            className="form-control"
                            placeholder="Inizia a digitare il nome..." 
                            value={testoRicerca}
                            onChange={(e) => setTestoRicerca(e.target.value)} 
                        />
                    </div>
                    
                    {/* Lista risultati */}
                    <ul className="lista-tornei" style={{ marginTop: '20px' }}>
                        {squadreFiltrate.map(squadra => (
                            <li key={squadra.id} className="card-torneo">
                                <h3 style={{ margin: '0 0 5px 0', color: '#2c3e50' }}>{squadra.nome}</h3>
                                <p style={{ margin: 0, color: '#555' }}>
                                    <strong>Città:</strong> {squadra.citta}
                                </p>
                            </li>
                        ))}
                    </ul>
                    
                    {/* Messaggio vuoto */}
                    {squadreFiltrate.length === 0 && (
                        <div style={{ textAlign: 'center', marginTop: '20px', color: '#777', fontStyle: 'italic' }}>
                            Nessuna squadra trovata con questo nome.
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('react-app'));
        root.render(<RicercaSquadre />);
        
        /*]]>*/
    </script>

</body>
</html>
