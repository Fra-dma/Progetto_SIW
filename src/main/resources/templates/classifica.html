<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Classifica Torneo</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <!-- Contenitore centrale -->
    <div class="container">
        
        <!-- Sfrutta la variabile torneo passata dal Controller -->
        <h1 class="text-center">Classifica: <span th:text="${torneo.nome}">Nome Torneo</span></h1>

        <!-- Aggiunta la classe .table -->
        <table class="table">
            <thead>
                <tr>
                    <th>Posizione</th>
                    <th>Squadra</th>
                    <th>Punti</th>
                    <!-- Controllo Admin -->
                    <th th:if="${isAdmin}">Azione</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="riga, iterStat : ${classifica}">    
                    <td th:text="${iterStat.count}">1</td>
                    <td>
                        <a th:href="@{/squadra/{id}(id=${riga.squadra.id})}" th:text="${riga.squadra.nome}">Nome Squadra</a>
                    </td>
                    <td th:text="${riga.punti}">0</td>
                    
                    <!-- Controllo Admin, ora usa le classi dei bottoni -->
                    <td th:if="${isAdmin}">
                        <a th:href="@{/admin/torneo/{idTorneo}/squadra/{idSquadra}/rimuovi(idTorneo=${torneo.id}, idSquadra=${riga.squadra.id})}" 
                           class="btn btn-danger btn-sm">
                           Rimuovi
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>

        <!-- Link per tornare indietro -->
        <div class="text-center" style="margin-top: 30px;">
            <a th:href="@{/tornei}" style="color: #555; text-decoration: none;">&larr; Torna alla lista dei tornei</a>
        </div>

    </div>

</body>
</html>
