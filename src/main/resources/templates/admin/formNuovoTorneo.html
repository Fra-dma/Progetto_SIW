<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Crea Nuovo Torneo</title>
</head>
<body>

    <h1>Inserisci i dati del nuovo Torneo</h1>

    <form th:action="@{/admin/torneo/nuovo}" th:object="${torneo}" method="POST">
        
        <div>
            <label for="nome">Nome del Torneo:</label>
            <input type="text" id="nome" th:field="*{nome}" required />
        </div>
		
		<div>
		    <label for="anno">Anno del Torneo:</label>
		    <input type="number" id="anno" th:field="*{anno}" required />
		</div>
		        
		<br>
		        
	    <div>
		    <label for="descrizione">Descrizione:</label>
		    <textarea id="descrizione" th:field="*{descrizione}" rows="4" cols="50"></textarea>
		</div>
        
        <br>
        
        <button type="submit">Crea Torneo e Vai alle Partite</button>
    </form>

    <br>
    <a href="/tornei">Torna alla Homepage</a>

</body>
</html>
