<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Crea Nuovo Torneo</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <div class="container" style="max-width: 600px; margin-top: 50px;">

        <h1 class="text-center" style="color: #2c3e50; margin-bottom: 30px;">Crea un Nuovo Torneo</h1>

        <!-- Card per la creazione del nuovo Torneo -->
        <div class="card-torneo" style="background-color: #f8f9fa;">
            
            <form th:action="@{/admin/torneo/nuovo}" th:object="${torneo}" method="POST">
                
                <!-- Nome del Torneo -->
                <div class="form-group">
                    <label for="nome">Nome del Torneo:</label>
                    <input type="text" id="nome" th:field="*{nome}" class="form-control" required 
                           placeholder="Es. Torneo Estivo Universitario" />
                </div>
                
                <!-- Anno -->
                <div class="form-group">
                    <label for="anno">Anno del Torneo:</label>
                    <!-- Servirebbe nel caso entrassi da cellulare per far aprire il tastierino numerico-->
                    <input type="number" id="anno" th:field="*{anno}" class="form-control" required 
                           placeholder="Es. 2026" />
                </div>
                        
                <!-- Descrizione -->
                <div class="form-group">
                    <label for="descrizione">Descrizione:</label>
                    <textarea id="descrizione" th:field="*{descrizione}" class="form-control" rows="5" 
                              placeholder="Inserisci qui i dettagli, le regole o le informazioni sul torneo..."></textarea>
                </div>
                
                <!-- Tasto di conferma per inviare i dati -->
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 15px; font-size: 16px;">
                    Crea Torneo
                </button>
                
            </form>
            
        </div>

        <!-- Link per tornare indietro -->
        <div class="text-center" style="margin-top: 30px;">
            <a th:href="@{/admin/dashboard}" style="color: #555; text-decoration: none;">&larr; Torna al Pannello di Controllo</a>
        </div>

    </div>

</body>
</html>
