<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Crea Nuova Squadra</title>
</head>
<body>

    <h1>Inserisci i dati della nuova Squadra</h1>

    <form th:action="@{/admin/squadra/nuova}" th:object="${squadra}" method="POST">
        
        <div>
            <label for="nome">Nome della Squadra:</label>
            <input type="text" id="nome" th:field="*{nome}" required />
        </div>
        
        <br>
		
		<div>
		    <label for="annoDiFondazione">Anno di fondazione:</label>
		    <input type="number" id="annoDiFondazione" th:field="*{annoDiFondazione}" required />
		</div>
		
		<br>

		<div>
		    <label for="citta">Città:</label>
		    <input type="text" id="citta" th:field="*{citta}" required />
		</div>
		
		<br>

		    <h3>Seleziona i giocatori:</h3>
		        
		<div th:each="giocatore : ${elencoGiocatori}">
		            
		   <input type="checkbox" th:field="*{giocatori}" th:value="${giocatore.id}" />
		            
		   <label th:text="${giocatore.nome} + ' ' + ${giocatore.cognome}">Nome Cognome</label>
		            
		</div>
		
		<br>
        
        <button type="submit">Salva Squadra</button>
		
    </form>

    <br>
    <a th:href="@{/admin/dashboard}">Annulla e torna al Pannello di Controllo</a>

</body>
</html>
