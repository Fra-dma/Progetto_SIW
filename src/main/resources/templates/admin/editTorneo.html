<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Modifica Torneo</title>
</head>
<body>

    <h1>Modifica Torneo: <span th:text="${torneo.nome}"></span></h1>

    <!-- 1. MODULO MODIFICA TORNEO -->
    <form th:action="@{/admin/torneo/modifica}" th:object="${torneo}" method="POST">
        <input type="hidden" th:field="*{id}" /> <!-- Fondamentale per far capire a Spring quale torneo aggiornare -->
        
        <label>Nome:</label> <input type="text" th:field="*{nome}" required />
        <br>
        <label>Anno:</label> <input type="number" th:field="*{anno}" required />
        <br>
        <label>Descrizione:</label> <textarea th:field="*{descrizione}"></textarea>
        
        <h3>Seleziona Squadre Partecipanti:</h3>
        <div th:each="squadra : ${tutteLeSquadre}">
            <input type="checkbox" th:field="*{squadrePartecipanti}" th:value="${squadra.id}" />
            <label th:text="${squadra.nome}"></label>
        </div>
        
        <button type="submit">Salva Modifiche Torneo</button>
    </form>

    <hr>

    <!-- 2. MODULO AGGIUNGI PARTITA -->
    <h3>Aggiungi Nuova Partita</h3>
    <form th:action="@{/admin/torneo/{id}/aggiungiPartita(id=${torneo.id})}" th:object="${nuovaPartita}" method="POST">
        
        <label>Data e Ora:</label> 
        <input type="datetime-local" th:field="*{dataEOra}" required />
        <br>
        <label>Luogo:</label> 
        <input type="text" th:field="*{luogo}" required />
        <br>
        <label>Squadra Casa:</label>
        <select name="squadraCasaId" required>
            <option th:each="s : ${tutteLeSquadre}" th:value="${s.id}" th:text="${s.nome}"></option>
        </select>
        <br>
        <label>Squadra Ospite:</label>
        <select name="squadraOspiteId" required>
            <option th:each="s : ${tutteLeSquadre}" th:value="${s.id}" th:text="${s.nome}"></option>
        </select>
        <br>
        <label>Arbitro:</label>
        <select name="arbitroId" required>
            <option th:each="a : ${tuttiGliArbitri}" th:value="${a.id}" th:text="${a.nome}"></option>
        </select>
        <br>
		<label>Risultato (Casa):</label> 
				<input type="number" th:field="*{goalsHome}" min="0" />
				<br>

				<label>Risultato (Ospite):</label> 
				<input type="number" th:field="*{goalsAway}" min="0" />
				<br>

				<label>Stato Partita:</label>
				<select th:field="*{stato}">
				    <option value="PLAYED">Da giocare</option>
				    <option value="SCHEDULED">In corso</option>
				</select>
				<br>
        <button type="submit">Crea Partita</button>
		
    </form>

    <br>
    <a th:href="@{/admin/dashboard}">Torna alla Dashboard</a>

</body>
</html>
